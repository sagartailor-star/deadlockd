services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - STRESS_PROCESSES=${STRESS_PROCESSES:-5}
      - STRESS_RESOURCES=${STRESS_RESOURCES:-3}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
